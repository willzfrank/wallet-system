spring.application.name=test
server.port=9090

# H2 DB config
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA config
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.generate-ddl=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.jakarta.persistence.lock.timeout=3000

# Enable H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Compatibility fix for springdoc path patterns on current stack
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# Show parameter values (not just placeholders like '?')
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Idempotency lifecycle policy
wallet.idempotency.replay-window-hours=24
wallet.idempotency.retention-days=7
wallet.idempotency.cleanup-cron=0 0 2 * * *

# Overload protection (rate limiting + backpressure)
wallet.transfer.rate-limit-per-second=1000
wallet.transfer.max-inflight=200
wallet.transfer.circuit-breaker.failure-threshold=20
wallet.transfer.circuit-breaker.open-seconds=15

# Retry policy (bounded with jitter)
wallet.retry.create-user.max-attempts=4
wallet.retry.create-user.delay-ms=25
wallet.retry.create-user.max-delay-ms=300

